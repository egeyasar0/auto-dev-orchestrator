<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" role="img" aria-labelledby="title desc">
  <title id="title">auto-dev plan terminal screenshot</title>
  <desc id="desc">Sanitized terminal output for a successful auto-dev plan command.</desc>
  <rect width="1080" height="560" rx="16" fill="#111827"/>
  <rect x="0" y="0" width="1080" height="48" rx="16" fill="#1f2937"/>
  <circle cx="28" cy="24" r="6" fill="#f87171"/>
  <circle cx="48" cy="24" r="6" fill="#fbbf24"/>
  <circle cx="68" cy="24" r="6" fill="#34d399"/>
  <text x="88" y="30" font-family="Consolas, Menlo, Monaco, monospace" font-size="14" fill="#d1d5db">auto-dev plan</text>
  <text x="32" y="84" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#93c5fd">$ PYTHONPATH=src python -m auto_dev plan "Add a short TODO section to README, plan only"</text>
  <text x="32" y="126" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">Implementation plan:</text>
  <text x="32" y="154" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">1. Inspect README.md to find the right place for a short TODO section.</text>
  <text x="32" y="182" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">2. Add a minimal TODO section with 2-3 concise bullets.</text>
  <text x="32" y="210" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">3. Avoid touching unrelated dirty files.</text>
  <text x="32" y="254" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">Files likely to change:</text>
  <text x="32" y="282" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">- README.md</text>
  <text x="32" y="326" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">Tests to run:</text>
  <text x="32" y="354" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">- No tests needed for README-only documentation change.</text>
  <text x="32" y="398" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">Approval-sensitive operations:</text>
  <text x="32" y="426" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#e5e7eb">- None. No installs, network, destructive git commands, or elevated access needed.</text>
  <text x="32" y="474" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#a7f3d0">--- deterministic review ---</text>
  <text x="32" y="502" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#a7f3d0">AUTO-APPROVABLE: low risk and no approval-sensitive operations detected.</text>
  <text x="32" y="530" font-family="Consolas, Menlo, Monaco, monospace" font-size="16" fill="#9ca3af">Run artifacts: &lt;project-root&gt;/.agent/runs/&lt;timestamp&gt;</text>
</svg>
